// ─── GOOGLE CALENDAR INTEGRATION ───────────────────────────────────
// → Créez un projet sur console.cloud.google.com, activez "Google Calendar API"
// → Créez des identifiants OAuth 2.0 (application Web), autorisez l'origine de ce fichier
// → Remplacez la valeur ci-dessous par votre Client ID
const GCAL_CLIENT_ID = '8457965398-3uqisnnsu64l0vc21mbq39o9cp4uqh4s.apps.googleusercontent.com';
const GCAL_SCOPE = 'https://www.googleapis.com/auth/calendar.events';
let _gcalClient = null;
let _gcalToken = null;

function _initGCal(onToken) {
  if (!window.google?.accounts?.oauth2) return false;
  _gcalClient = window.google.accounts.oauth2.initTokenClient({
    client_id: GCAL_CLIENT_ID,
    scope: GCAL_SCOPE,
    callback: r => { if (r.access_token) { _gcalToken = r.access_token; onToken(r.access_token); } }
  });
  return true;
}

async function _gcalReq(method, path, body) {
  if (!_gcalToken) return null;
  try {
    const r = await fetch('https://www.googleapis.com/calendar/v3' + path, {
      method,
      headers: {'Authorization': 'Bearer ' + _gcalToken, 'Content-Type': 'application/json'},
      body: body ? JSON.stringify(body) : undefined
    });
    if (r.status === 204) return {};
    return r.ok ? r.json() : null;
  } catch { return null; }
}

async function _fetchGCalEvents() {
  const now = new Date();
  const tMin = encodeURIComponent(now.toISOString());
  const tMax = encodeURIComponent(new Date(+now + 10*86400000).toISOString());
  const d = await _gcalReq('GET', `/calendars/primary/events?timeMin=${tMin}&timeMax=${tMax}&singleEvents=true&orderBy=startTime&maxResults=250`);
  return d?.items || [];
}

function _gToLocal(g) {
  const dt = g.start?.dateTime || g.start?.date || '';
  return {
    id: 'gcal_' + g.id, gcalId: g.id, fromGCal: true,
    title: g.summary || 'Sans titre',
    date: dt.split('T')[0],
    time: g.start?.dateTime ? dt.split('T')[1].substring(0,5) : '',
    cat: 'other', cal: 'artist', notes: g.description || ''
  };
}

async function _pushGCal(ev) {
  const tz = 'Europe/Paris';
  let end = ev.time;
  if (ev.time) {
    const [h,m] = ev.time.split(':').map(Number);
    end = String((h+1)%24).padStart(2,'0') + ':' + String(m).padStart(2,'0');
  }
  const body = {
    summary: ev.title,
    description: ev.notes || '',
    start: ev.time ? {dateTime:`${ev.date}T${ev.time}:00`,timeZone:tz} : {date:ev.date},
    end:   ev.time ? {dateTime:`${ev.date}T${end}:00`,timeZone:tz}   : {date:ev.date}
  };
  const r = await _gcalReq('POST', '/calendars/primary/events', body);
  return r?.id || null;
}

async function _deleteGCal(gcalId) {
  if (gcalId) await _gcalReq('DELETE', `/calendars/primary/events/${gcalId}`);
}

// ─── UTILS ──────────────────────────────────────────────────────────
const td=()=>new Date().toISOString().split('T')[0];
const fd=d=>new Date(d+'T00:00:00').toLocaleDateString('fr-FR',{day:'2-digit',month:'short'});
const ff=d=>new Date(d+'T00:00:00').toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
const fw=d=>new Date(d+'T00:00:00').toLocaleDateString('fr-FR',{weekday:'short'}).toUpperCase().slice(0,3);
const fday=d=>new Date(d+'T00:00:00').getDate();

const icsD=(ds,ts)=>{const d=ds.replace(/-/g,'');return ts?d+'T'+ts.replace(/:/g,'')+'00':d;};
const escI=s=>(s||'').replace(/\n/g,'\\n').replace(/,/g,'\\,');
const mkICS=(evs,nm)=>{
  const now=new Date().toISOString().replace(/[-:.]/g,'').slice(0,15)+'Z';
  const l=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Salem-Alsem//','X-WR-CALNAME:'+escI(nm),'METHOD:PUBLISH'];
  evs.forEach(e=>{
    l.push('BEGIN:VEVENT','UID:'+e.id+'@mgmt','DTSTAMP:'+now);
    if(e.time){l.push('DTSTART;TZID=Europe/Paris:'+icsD(e.date,e.time));const[h,m]=e.time.split(':').map(Number);l.push('DTEND;TZID=Europe/Paris:'+icsD(e.date,String(h+1).padStart(2,'0')+':'+String(m).padStart(2,'0')));}
    else{l.push('DTSTART;VALUE=DATE:'+icsD(e.date));const nd=new Date(e.date+'T00:00:00');nd.setDate(nd.getDate()+1);l.push('DTEND;VALUE=DATE:'+nd.toISOString().split('T')[0].replace(/-/g,''));}
    l.push('SUMMARY:'+escI(e.title));if(e.notes)l.push('DESCRIPTION:'+escI(e.notes));l.push('END:VEVENT');
  });
  l.push('END:VCALENDAR');return l.join('\r\n');
};
const dlICS=(c,f)=>{const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([c],{type:'text/calendar'}));a.download=f;a.click();};

function Bdg({b,T,children}){
  const s=T.bp[b]||T.bp.muted;
  return <span style={{fontSize:9,fontWeight:700,letterSpacing:'.08em',padding:'4px 9px 3px',borderRadius:20,background:s.bg,color:s.tx,border:'1px solid '+s.bd,textTransform:'uppercase',whiteSpace:'nowrap',fontFamily:T.fM,lineHeight:1,display:'inline-flex',alignItems:'center'}}>{children}</span>;
}

function Bar({v,h,T}){
  v=v||0;h=h||4;
  const fill=v>=100?'#34d399':'linear-gradient(90deg,'+T.c1+','+T.c2+')';
  return <div style={{height:h,background:'rgba(255,255,255,.08)',borderRadius:h,overflow:'hidden'}}>
    <div style={{height:'100%',width:v+'%',borderRadius:h,background:fill,transition:'width .6s'}}/>
  </div>;
}

function FF({label,T,children}){
  return <div style={{display:'flex',flexDirection:'column',gap:6}}>
    <span style={{fontSize:9,fontWeight:700,color:T.txd,textTransform:'uppercase',letterSpacing:'.14em',fontFamily:T.fM}}>{label}</span>
    {children}
  </div>;
}

function IS(T){
  return {width:'100%',padding:'11px 13px',background:'#1a1a2e',border:'1px solid '+T.border,borderRadius:14,fontSize:13,color:'#ffffff',outline:'none',fontFamily:T.fB,colorScheme:'dark'};
}

function Empty({text,T}){
  return <div style={{textAlign:'center',padding:'32px 0',color:T.txd,fontSize:11,fontFamily:T.fM}}>{text}</div>;
}

// ─── MODAL ──────────────────────────────────────────────────────────
function Modal({title,onClose,onConfirm,cLabel,onDelete,T,children}){
  return <div style={{position:'fixed',inset:0,zIndex:400,background:'rgba(0,0,0,.92)',backdropFilter:'blur(16px)',display:'flex',alignItems:'flex-end'}} onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div style={{width:'100%',maxWidth:430,margin:'0 auto',background:T.cardAlt,borderRadius:'28px 28px 0 0',border:'1px solid '+T.border,borderBottom:'none',padding:'24px 20px 48px',maxHeight:'90vh',overflowY:'auto',animation:'slideUp .28s ease'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:22}}>
        <h3 style={{fontSize:20,fontWeight:700,fontFamily:T.fD,color:T.tx,letterSpacing:'.02em'}}>{title}</h3>
        <div style={{display:'flex',gap:8}}>
          {onDelete&&<button onClick={onDelete} style={{width:34,height:34,borderRadius:'50%',background:'rgba(255,60,60,.1)',color:'#f06060',border:'1px solid rgba(255,60,60,.2)',fontSize:14,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>🗑</button>}
          <button onClick={onClose} style={{width:34,height:34,borderRadius:'50%',background:'rgba(255,255,255,.08)',color:T.txs,border:'1px solid '+T.border,fontSize:22,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',lineHeight:1}}>×</button>
        </div>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:14}}>{children}</div>
      {onConfirm&&<button onClick={onConfirm} style={{width:'100%',marginTop:22,padding:15,background:'linear-gradient(135deg,'+T.c1+','+T.c2+')',borderRadius:16,fontSize:12,fontWeight:700,color:'#fff',letterSpacing:'.08em',cursor:'pointer',border:'none',fontFamily:T.fB,textTransform:'uppercase'}}>{cLabel}</button>}
    </div>
  </div>;
}

// ─── EVENT ROW ──────────────────────────────────────────────────────
function EvRow({ev,onClick,T,pid}){
  const cats=CATS[pid]||CATS.salem;
  const cat=cats[ev.cat]||cats.other||{l:'Autre',b:'muted'};
  const cc=T.catC[ev.cat]||'#555';
  return <div onClick={onClick} style={{display:'flex',gap:12,padding:'12px 14px',background:'rgba(255,255,255,.04)',borderRadius:16,border:'1px solid rgba(255,255,255,.07)',borderLeft:'3px solid '+cc,marginBottom:8,cursor:onClick?'pointer':'default'}}>
    <div style={{width:40,minWidth:40,height:40,borderRadius:12,background:cc+'1a',border:'1px solid '+cc+'33',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',flexShrink:0,gap:1}}>
      <span style={{fontSize:18,color:'#fff',lineHeight:1,fontFamily:T.fD,textAlign:'center'}}>{fday(ev.date)}</span>
      <span style={{fontSize:7,color:cc,fontWeight:700,fontFamily:T.fM,lineHeight:1}}>{fw(ev.date)}</span>
    </div>
    <div style={{flex:1,minWidth:0}}>
      <div style={{fontSize:13,fontWeight:600,color:T.tx,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontFamily:T.fB}}>{ev.title}</div>
      <div style={{fontSize:10,color:T.txs,marginTop:2,fontFamily:T.fB}}>{ev.time||'Journee'} · <span style={{color:ev.cal==='manager'?T.c3:T.c2}}>{ev.cal==='manager'?'Hilaire':T.name}</span></div>
    </div>
    <Bdg b={cat.b} T={T}>{cat.l}</Bdg>
  </div>;
}

// ─── EXPORT ICS MODAL ───────────────────────────────────────────────
function ExportModal({events,T,pid,onClose}){
  const [step,setStep]=useState('choose');
  const [done,setDone]=useState('');
  const doX=cf=>{
    const evs=cf==='all'?events:events.filter(e=>e.cal===cf);
    const nm=cf==='manager'?('Hilaire - '+T.name):cf==='artist'?T.name:(T.name+' Complet');
    dlICS(mkICS(evs,nm),'planning-'+cf+'-'+pid+'.ics');
    setDone(nm);setStep('done');
  };
  const opts=[{id:'artist',e:'🎤',l:'Calendrier '+T.name,s:'Evenements artiste'},{id:'manager',e:'🤝',l:'Calendrier Hilaire',s:'Reunions et admin'},{id:'all',e:'📦',l:'Tout exporter',s:'Les deux calendriers'}];
  return <Modal title="Export Google Agenda" onClose={onClose} T={T}>
    {step==='choose'&&<>
      <p style={{fontSize:12,color:T.txs,fontFamily:T.fB,lineHeight:1.6}}>Selectionne le calendrier a exporter en fichier .ics</p>
      {opts.map(o=><button key={o.id} onClick={()=>doX(o.id)} style={{display:'flex',alignItems:'center',gap:14,padding:'14px 16px',width:'100%',background:'rgba(255,255,255,.04)',border:'1px solid '+T.border,borderRadius:14,cursor:'pointer',textAlign:'left',marginBottom:8}}>
        <span style={{fontSize:22}}>{o.e}</span>
        <div><div style={{fontSize:13,fontWeight:600,color:T.tx,fontFamily:T.fB}}>{o.l}</div><div style={{fontSize:10,color:T.txs,fontFamily:T.fB,marginTop:2}}>{o.s} · {(o.id==='all'?events:events.filter(e=>e.cal===o.id)).length} ev.</div></div>
        <svg style={{marginLeft:'auto'}} width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={T.txd} strokeWidth="2" strokeLinecap="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>)}
    </>}
    {step==='done'&&<>
      <div style={{textAlign:'center',padding:'8px 0'}}>
        <div style={{width:56,height:56,borderRadius:'50%',background:'rgba(52,211,153,.1)',border:'1px solid rgba(52,211,153,.3)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 14px',fontSize:26}}>✓</div>
        <p style={{fontSize:15,fontWeight:700,color:'#34d399',fontFamily:T.fB,marginBottom:6}}>Fichier telecharge !</p>
        <p style={{fontSize:12,color:T.txs,fontFamily:T.fB}}>{done} dans tes Telechargements.</p>
      </div>
      {[['1','Ouvre calendar.google.com'],['2','Parametres > Importer'],['3','Selectionne le .ics'],['4','Choisir le calendrier > OK']].map(([n,txt])=>(
        <div key={n} style={{display:'flex',gap:12,padding:'10px 14px',background:'rgba(255,255,255,.04)',borderRadius:12,border:'1px solid '+T.border,marginBottom:6}}>
          <div style={{width:20,height:20,borderRadius:'50%',background:T.cDim,display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:700,color:T.c1,flexShrink:0,fontFamily:T.fM}}>{n}</div>
          <span style={{fontSize:12,color:T.tx,fontFamily:T.fB}}>{txt}</span>
        </div>
      ))}
      <button onClick={()=>setStep('choose')} style={{padding:'10px',background:T.cDim,borderRadius:12,fontSize:11,fontWeight:600,color:T.c1,border:'1px solid '+T.c1+'33',cursor:'pointer',width:'100%',fontFamily:T.fB,marginTop:4}}>Exporter un autre</button>
    </>}
  </Modal>;
}

// ─── HOME ────────────────────────────────────────────────────────────
function Home({events,projects,posts,goTo,T,pid}){
  const tdy=td();
  const h=new Date().getHours();
  const gr=h<12?'Bonjour':h<18?'Bon ap.':'Bonsoir';
  const tEvs=events.filter(e=>e.date===tdy);
  const aP=projects.filter(p=>p.status==='inprogress');
  const up=events.filter(e=>e.date>tdy).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,3);
  const sc=posts.filter(p=>p.status==='scheduled').length;

  function Sec({title,onMore,children}){
    return <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
        <span style={{fontSize:12,fontWeight:700,color:'rgba(255,255,255,.8)',letterSpacing:'.04em',fontFamily:T.fB,textTransform:'uppercase'}}>{title}</span>
        <button onClick={onMore} style={{fontSize:10,color:T.c1,fontWeight:700,background:'none',border:'none',cursor:'pointer',fontFamily:T.fB,textTransform:'uppercase',letterSpacing:'.06em'}}>TOUT</button>

  return <div style={{animation:'fadeIn .35s ease'}}>
    <div style={{padding:'64px 24px 28px',background:T.heroBg,position:'relative',overflow:'hidden'}}>
      <div style={{position:'absolute',top:-40,right:-40,width:180,height:180,borderRadius:'50%',background:'radial-gradient(circle,'+T.heroOrb1+',transparent 70%)',pointerEvents:'none'}}/>
      <div style={{position:'absolute',bottom:-30,left:-30,width:140,height:140,borderRadius:'50%',background:'radial-gradient(circle,'+T.heroOrb2+',transparent 70%)',pointerEvents:'none'}}/>
      <div style={{display:'flex',alignItems:'flex-end',justifyContent:'space-between',marginBottom:24}}>
        <div>
          <h1 style={{fontFamily:T.fD,fontSize:80,color:T.tx,lineHeight:.82,letterSpacing:'.04em'}}>{T.name.toUpperCase()}</h1>
          <div style={{height:3,width:90,background:T.barGrad,borderRadius:2,marginTop:10}}/>
        </div>
        <div style={{width:60,height:60,borderRadius:'50%',background:T.avatarGrad,display:'flex',alignItems:'center',justifyContent:'center',fontSize:28,fontFamily:T.fD,color:'#fff',boxShadow:'0 0 36px '+T.c1+'55',flexShrink:0}}>{T.initial}</div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}}>
        {[{v:tEvs.length,l:'Auj.'},{v:aP.length,l:'Actifs'},{v:sc,l:'Prog.'}].map((s,i)=>(
          <div key={i} style={{background:'rgba(255,255,255,.06)',borderRadius:16,padding:'13px 8px',border:'1px solid rgba(255,255,255,.08)',textAlign:'center',backdropFilter:'blur(8px)'}}>
            <div style={{fontSize:38,color:T.statC[i],lineHeight:1,fontFamily:T.fD}}>{s.v}</div>
            <div style={{fontSize:8,color:T.txs,textTransform:'uppercase',letterSpacing:'.12em',marginTop:2,fontFamily:T.fB}}>{s.l}</div>
          </div>
        ))}
      </div>
    </div>
    <div style={{padding:'20px',display:'flex',flexDirection:'column',gap:24}}>
      <Sec title="Aujourd hui" onMore={()=>goTo('planning')}>{tEvs.length===0?<Empty text="Journee libre" T={T}/>:tEvs.map(e=><EvRow key={e.id} ev={e} T={T} pid={pid}/>)}</Sec>
      <Sec title="Projets actifs" onMore={()=>goTo('projects')}>
        {aP.length===0?<Empty text="Aucun projet en cours" T={T}/>:aP.slice(0,2).map((p,i)=>{
          const grads=['linear-gradient(90deg,'+T.c1+','+T.c2+')','linear-gradient(90deg,'+T.c2+','+T.c3+')'];
          return <div key={p.id} style={{background:'rgba(255,255,255,.04)',borderRadius:18,padding:16,border:'1px solid rgba(255,255,255,.07)',marginBottom:10}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:10}}><span style={{fontSize:13,fontWeight:700,color:T.tx,flex:1,marginRight:8,fontFamily:T.fB}}>{p.title}</span><span style={{fontSize:24,color:T.tx,fontFamily:T.fD}}>{p.progress}%</span></div>
            <div style={{height:6,background:'rgba(255,255,255,.08)',borderRadius:6,overflow:'hidden'}}><div style={{height:'100%',width:p.progress+'%',borderRadius:6,background:p.progress>=100?'#34d399':grads[i%2],transition:'width .6s'}}/></div>
            <p style={{fontSize:11,color:T.txs,marginTop:7,fontFamily:T.fB}}>{p.desc}</p>
          </div>;
        })}
      </Sec>
      <Sec title="A venir" onMore={()=>goTo('planning')}>{up.length===0?<Empty text="Rien de planifie" T={T}/>:up.map(e=><EvRow key={e.id} ev={e} T={T} pid={pid}/>)}</Sec>
    </div>
  </div>;
}

// ─── PLANNING ────────────────────────────────────────────────────────
function Planning({events,setEvents,T,pid,onAddFinance}){
  const [fil,setFil]=useState('all');
  const [showAdd,setShowAdd]=useState(false);
  const [showExp,setShowExp]=useState(false);
  const [sel,setSel]=useState(null);
  const cats=CATS[pid]||CATS.salem;
  const fc=Object.keys(cats)[0];
  const [nev,setNev]=useState({title:'',date:'',time:'',dur:60,cal:'artist',cat:fc,notes:''});
  const is=IS(T);
  const list=events.filter(e=>fil==='all'||e.cal===fil).sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
  const grp=list.reduce((acc,e)=>{acc[e.date]=[...(acc[e.date]||[]),e];return acc;},{});
  const add=()=>{
    if(!nev.title||!nev.date)return;
    const newEv={...nev,id:Date.now()};
    setEvents(p=>[...p,newEv]);
    setNev({title:'',date:'',time:'',cal:'artist',cat:fc,notes:''});
    setShowAdd(false);
    // Auto-prompt finance for client/mix in Alsem
    if(pid==='alsem'&&(nev.cat==='client'||nev.cat==='mix')&&onAddFinance){
      onAddFinance(newEv);
    }
  };

  return <div style={{animation:'fadeIn .3s ease'}}>
    <div style={{padding:'64px 24px 22px',background:T.heroBg}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
        <div style={{flex:1,marginRight:12}}>
          <h2 style={{fontSize:52,fontFamily:T.fD,color:T.tx,lineHeight:.88,letterSpacing:'.04em'}}>PLANNING</h2>
          <button onClick={()=>setShowExp(true)} style={{display:'inline-flex',alignItems:'center',gap:5,marginTop:9,padding:'5px 12px',borderRadius:20,fontSize:9,fontWeight:600,cursor:'pointer',background:T.cDim,color:T.c1,border:'1px solid '+T.c1+'44',fontFamily:T.fM,textTransform:'uppercase',letterSpacing:'.08em'}}>
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Export Google Agenda
          </button>
        </div>
        <button onClick={()=>setShowAdd(true)} style={{width:44,height:44,borderRadius:'50%',background:'linear-gradient(135deg,'+T.c1+','+T.c2+')',display:'flex',alignItems:'center',justifyContent:'center',border:'none',cursor:'pointer',flexShrink:0,boxShadow:'0 0 20px '+T.c1+'44'}}>
          <span style={{fontSize:26,color:'#fff',fontWeight:300,lineHeight:1,marginTop:-2}}>+</span>
        </button>
      </div>
      <div style={{display:'flex',gap:8,marginTop:16}}>
        {[{id:'all',l:'Tous'},{id:'manager',l:'Hilaire'},{id:'artist',l:T.name}].map(f=>(
          <button key={f.id} onClick={()=>setFil(f.id)} style={{padding:'7px 16px',borderRadius:22,fontSize:10,fontWeight:700,cursor:'pointer',background:fil===f.id?T.c1:'rgba(255,255,255,.06)',color:fil===f.id?'#fff':'rgba(255,255,255,.45)',border:'1px solid '+(fil===f.id?T.c1:'rgba(255,255,255,.1)'),fontFamily:T.fB,textTransform:'uppercase',letterSpacing:'.04em'}}>{f.l}</button>
        ))}
      </div>
    </div>
    <div style={{padding:'12px 20px 20px'}}>
      {Object.keys(grp).length===0?<Empty text="Aucun evenement" T={T}/>:Object.entries(grp).map(([date,evs])=>(
        <div key={date} style={{marginBottom:22}}>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10,marginTop:8}}>
            <span style={{fontSize:11,fontWeight:700,color:date===td()?T.c1:'rgba(255,255,255,.4)',textTransform:'capitalize',fontFamily:T.fB}}>{ff(date)}</span>
            {date===td()&&<Bdg b="orange" T={T}>Aujourd hui</Bdg>}
          </div>
          {evs.map(e=><EvRow key={e.id} ev={e} onClick={()=>setSel(e)} T={T} pid={pid}/>)}
        </div>
      ))}
    </div>
    {showExp&&<ExportModal events={events} T={T} pid={pid} onClose={()=>setShowExp(false)}/>}
    {showAdd&&<Modal title="Nouvel evenement" onClose={()=>setShowAdd(false)} onConfirm={add} cLabel="AJOUTER" T={T}>
      <FF label="Titre" T={T}><input value={nev.title} onChange={e=>setNev(p=>({...p,title:e.target.value}))} placeholder="Titre..." style={is}/></FF>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        <FF label="Date" T={T}><input type="date" value={nev.date} onChange={e=>setNev(p=>({...p,date:e.target.value}))} style={is}/></FF>
        <FF label="Heure" T={T}>
          <div style={{display:'flex',gap:6}}>
            <select value={nev.time.split(':')[0]||''} onChange={e=>{const m=nev.time.split(':')[1]||'00';setNev(p=>({...p,time:e.target.value?(e.target.value+':'+m):''}))}} style={{...is,flex:1}}>
              <option value="">--</option>
              {Array.from({length:24},(_,i)=><option key={i} value={String(i).padStart(2,'0')}>{String(i).padStart(2,'0')}h</option>)}
            </select>
            <select value={nev.time.split(':')[1]||'00'} onChange={e=>{const h=nev.time.split(':')[0]||'';setNev(p=>({...p,time:h?(h+':'+e.target.value):''}))}} style={{...is,flex:1}}>
              {['00','15','30','45'].map(m=><option key={m} value={m}>{m}</option>)}
            </select>
          </div>
        </FF>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        <FF label="Durée" T={T}>
          <select value={nev.dur} onChange={e=>setNev(p=>({...p,dur:parseInt(e.target.value)}))} style={is}>
            {[15,30,45,60,90,120,180,240,300,360,480].map(d=><option key={d} value={d}>{d<60?d+'min':d===60?'1h':(Math.floor(d/60)+'h'+(d%60?String(d%60).padStart(2,'0'):''))}</option>)}
          </select>
        </FF>
      </div>
      <FF label="Calendrier" T={T}><div style={{display:'flex',gap:8}}>
        {[{id:'manager',l:'Hilaire'},{id:'artist',l:T.name}].map(c=><button key={c.id} onClick={()=>setNev(p=>({...p,cal:c.id}))} style={{flex:1,padding:'10px',borderRadius:12,fontSize:11,fontWeight:600,cursor:'pointer',background:nev.cal===c.id?T.cDim:'transparent',color:nev.cal===c.id?T.c1:T.txs,border:'1px solid '+(nev.cal===c.id?T.c1:T.border),fontFamily:T.fB}}>{c.l}</button>)}
      </div></FF>
      <FF label="Categorie" T={T}><select value={nev.cat} onChange={e=>setNev(p=>({...p,cat:e.target.value}))} style={is}>{Object.entries(cats).map(([k,v])=><option key={k} value={k}>{v.l}</option>)}</select></FF>
      <FF label="Notes" T={T}><textarea value={nev.notes} onChange={e=>setNev(p=>({...p,notes:e.target.value}))} placeholder="Notes..." style={{...is,height:65,resize:'none'}}/></FF>
    </Modal>}
    {sel&&<Modal title={sel.title} onClose={()=>setSel(null)} onDelete={()=>{setEvents(p=>p.filter(e=>e.id!==sel.id));setSel(null);}} T={T}>
      <div style={{background:'rgba(255,255,255,.04)',borderRadius:16,padding:16,border:'1px solid '+T.border}}>
        {[['Date',ff(sel.date)],['Heure',sel.time||'—'],['Agenda',sel.cal==='manager'?'Hilaire':T.name],['Type',(cats[sel.cat]||cats.other||{l:'?'}).l],sel.notes&&['Notes',sel.notes]].filter(Boolean).map(([l,v])=>(
          <div key={l} style={{display:'flex',gap:12,padding:'8px 0',borderBottom:'1px solid '+T.border}}>
            <span style={{fontSize:11,color:T.txs,minWidth:60,fontFamily:T.fM}}>{l}</span>
            <span style={{fontSize:12,color:T.tx,fontFamily:T.fB}}>{v}</span>
          </div>
        ))}
      </div>
    </Modal>}
  </div>;
}

// ─── PROJECTS ────────────────────────────────────────────────────────
function Projects({projects,setProjects,T}){
  const [view,setView]=useState('kanban');
  const [showAdd,setShowAdd]=useState(false);
  const [sel,setSel]=useState(null);
  const [np,setNp]=useState({title:'',desc:'',status:'todo',progress:0,deadline:'',tasks:[]});
  const is=IS(T);
  const add=()=>{if(!np.title)return;setProjects(p=>[...p,{...np,id:Date.now()}]);setNp({title:'',desc:'',status:'todo',progress:0,deadline:'',tasks:[]});setShowAdd(false);};
  const mov=(id,st)=>{setProjects(p=>p.map(x=>x.id===id?{...x,status:st,progress:st==='done'?100:st==='todo'?0:x.progress}:x));if(sel&&sel.id===id)setSel(s=>({...s,status:st,progress:st==='done'?100:st==='todo'?0:s.progress}));};

  return <div style={{animation:'fadeIn .3s ease'}}>
    <div style={{padding:'64px 24px 22px',background:T.heroBg}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
        <div>
          <h2 style={{fontSize:52,fontFamily:T.fD,color:T.tx,lineHeight:.88,letterSpacing:'.04em'}}>PROJETS</h2>
          <p style={{fontSize:10,color:T.txs,marginTop:6,fontFamily:T.fB}}>{projects.length} projets · {projects.filter(p=>p.status==='inprogress').length} actifs</p>
        </div>
        <button onClick={()=>setShowAdd(true)} style={{width:44,height:44,borderRadius:'50%',background:'linear-gradient(135deg,'+T.c1+','+T.c2+')',display:'flex',alignItems:'center',justifyContent:'center',border:'none',cursor:'pointer',flexShrink:0}}>
          <span style={{fontSize:26,color:'#fff',fontWeight:300,lineHeight:1,marginTop:-2}}>+</span>
        </button>
      </div>
      <div style={{display:'flex',marginTop:18,background:'rgba(255,255,255,.06)',borderRadius:14,padding:4,border:'1px solid rgba(255,255,255,.1)'}}>
        {[{id:'kanban',l:'Kanban'},{id:'list',l:'Liste'}].map(v=><button key={v.id} onClick={()=>setView(v.id)} style={{flex:1,padding:'8px',borderRadius:11,fontSize:11,fontWeight:700,cursor:'pointer',background:view===v.id?T.c1:'transparent',color:view===v.id?'#fff':'rgba(255,255,255,.4)',border:'none',fontFamily:T.fB}}>{v.l}</button>)}
      </div>
    </div>
    <div style={{padding:'12px 20px 20px'}}>
      {view==='kanban'?<div style={{overflowX:'auto',paddingBottom:8}}>
        <div style={{display:'flex',gap:14,minWidth:'max-content'}}>
          {['todo','inprogress','done'].map(col=>{
            const s=PST[col];const colP=projects.filter(p=>p.status===col);
            const cc=col==='todo'?T.txd:col==='inprogress'?T.c1:'#34d399';
            return <div key={col} style={{width:220}}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
                <div style={{width:6,height:6,borderRadius:'50%',background:cc}}/>
                <Bdg b={s.b} T={T}>{s.l}</Bdg>
                <span style={{fontSize:9,color:T.txd,fontFamily:T.fM}}>({colP.length})</span>
              </div>
              {colP.map(p=><div key={p.id} onClick={()=>setSel(p)} style={{background:'rgba(255,255,255,.04)',border:'1px solid rgba(255,255,255,.07)',borderLeft:'3px solid '+cc,borderRadius:'0 14px 14px 0',padding:14,marginBottom:10,cursor:'pointer'}}>
                <div style={{fontSize:12,fontWeight:700,color:T.tx,marginBottom:5,fontFamily:T.fB}}>{p.title}</div>
                <div style={{fontSize:10,color:T.txs,marginBottom:10,fontFamily:T.fB}}>{p.desc}</div>
                <Bar v={p.progress} h={4} T={T}/>
                <div style={{display:'flex',justifyContent:'space-between',marginTop:6}}><span style={{fontSize:14,color:cc,fontFamily:T.fD}}>{p.progress}%</span>{p.deadline&&<span style={{fontSize:9,color:T.txd,fontFamily:T.fM}}>{fd(p.deadline)}</span>}</div>
              </div>)}
              {colP.length===0&&<div style={{padding:'14px 0',color:T.txd,fontSize:9,fontFamily:T.fM}}>—</div>}
            </div>;
          })}
        </div>
      </div>:
      <div>
        {projects.map(p=>{
          const s=PST[p.status];
          return <div key={p.id} onClick={()=>setSel(p)} style={{background:'rgba(255,255,255,.04)',border:'1px solid rgba(255,255,255,.07)',borderRadius:18,padding:16,marginBottom:10,cursor:'pointer'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
              <div style={{flex:1,marginRight:10}}>
                <div style={{fontSize:13,fontWeight:700,color:T.tx,fontFamily:T.fB}}>{p.title}</div>
                <div style={{fontSize:10,color:T.txs,fontFamily:T.fB,marginTop:2}}>{p.desc}</div>
              </div>
              <Bdg b={s.b} T={T}>{s.l}</Bdg>
            </div>
            <Bar v={p.progress} h={6} T={T}/>
            <div style={{display:'flex',justifyContent:'space-between',marginTop:7}}>
              <span style={{fontSize:26,color:T.tx,fontFamily:T.fD}}>{p.progress}%</span>
              {p.deadline&&<span style={{fontSize:10,color:T.txd,fontFamily:T.fM}}>{fd(p.deadline)}</span>}
            </div>
          </div>;
        })}
      </div>}
    </div>

    {showAdd&&<Modal title="Nouveau projet" onClose={()=>setShowAdd(false)} onConfirm={add} cLabel="CREER" T={T}>
      <FF label="Titre" T={T}><input value={np.title} onChange={e=>setNp(p=>({...p,title:e.target.value}))} placeholder="Nom du projet" style={is}/></FF>
      <FF label="Description" T={T}><textarea value={np.desc} onChange={e=>setNp(p=>({...p,desc:e.target.value}))} placeholder="Description..." style={{...is,height:60,resize:'none'}}/></FF>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        <FF label="Statut" T={T}><select value={np.status} onChange={e=>setNp(p=>({...p,status:e.target.value}))} style={is}>{Object.entries(PST).map(([k,v])=><option key={k} value={k}>{v.l}</option>)}</select></FF>
        <FF label="Avancement %" T={T}><input type="number" min="0" max="100" value={np.progress} onChange={e=>setNp(p=>({...p,progress:Math.min(100,Math.max(0,parseInt(e.target.value)||0))}))} style={is}/></FF>
      </div>
      <FF label="Deadline" T={T}><input type="date" value={np.deadline} onChange={e=>setNp(p=>({...p,deadline:e.target.value}))} style={is}/></FF>
    </Modal>}

    {sel&&<Modal title={sel.title} onClose={()=>setSel(null)} onDelete={()=>{setProjects(p=>p.filter(x=>x.id!==sel.id));setSel(null);}} T={T}>
      <div style={{background:'rgba(255,255,255,.04)',borderRadius:16,padding:16,border:'1px solid '+T.border}}>
        <Bar v={sel.progress} h={8} T={T}/>
        <div style={{display:'flex',justifyContent:'space-between',marginTop:8,marginBottom:4}}>
          <span style={{fontSize:36,color:T.c1,fontFamily:T.fD}}>{sel.progress}%</span>
          {sel.deadline&&<span style={{fontSize:10,color:T.txs,fontFamily:T.fM}}>{fd(sel.deadline)}</span>}
        </div>
        <p style={{fontSize:11,color:T.txs,fontFamily:T.fB}}>{sel.desc}</p>
      </div>
      <div style={{display:'flex',gap:8}}>
        {Object.entries(PST).map(([k,v])=><button key={k} onClick={()=>mov(sel.id,k)} style={{flex:1,padding:'9px 4px',borderRadius:12,fontSize:10,fontWeight:700,cursor:'pointer',background:sel.status===k?T.cDim:'transparent',color:sel.status===k?T.c1:T.txs,border:'1px solid '+(sel.status===k?T.c1:T.border),fontFamily:T.fB,textTransform:'uppercase',letterSpacing:'.06em'}}>{v.l}</button>)}
      </div>
      {sel.tasks&&sel.tasks.length>0&&<div>
        <p style={{fontSize:8,color:T.txd,textTransform:'uppercase',letterSpacing:'.16em',marginBottom:8,fontFamily:T.fM}}>Taches</p>
        {sel.tasks.map((t,i)=><div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 12px',background:'rgba(255,255,255,.04)',borderRadius:10,marginBottom:6,border:'1px solid '+T.border}}>
          <div style={{width:16,height:16,borderRadius:4,border:'1.5px solid '+(t.includes('✓')?'#34d399':T.border),background:t.includes('✓')?'rgba(52,211,153,.1)':'transparent',display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,color:'#34d399',flexShrink:0}}>{t.includes('✓')&&'✓'}</div>
          <span style={{fontSize:12,color:t.includes('✓')?T.txs:T.tx,fontFamily:T.fB}}>{t.replace(' ✓','')}</span>
        </div>)}
      </div>}
    </Modal>}
  </div>;
}

// ─── TEMPLATE PICKER ────────────────────────────────────────────────

    <div style={{width:'100%',maxWidth:430,margin:'0 auto',background:T.cardAlt,borderRadius:'28px 28px 0 0',border:'1px solid '+T.border,borderBottom:'none',padding:'0 0 48px',maxHeight:'90vh',display:'flex',flexDirection:'column',animation:'slideUp .28s ease'}}>
      <div style={{padding:'22px 20px 16px',borderBottom:'1px solid '+T.border,flexShrink:0}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:36,height:36,borderRadius:'50%',background:pl.c+'22',border:'1px solid '+pl.c+'44',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>{pl.e}</div>
            <div>

            </div>

            </div>
            <div style={{fontSize:10,color:T.txd,fontFamily:T.fM,lineHeight:1.5,overflow:'hidden',maxHeight:44}}>{tmpl.body.slice(0,90)+'...'}</div>
            {tmpl.tags&&<div style={{marginTop:6,fontSize:9,color:pl.c,fontFamily:T.fM,opacity:.65}}>{tmpl.tags.split(' ').slice(0,4).join(' ')}</div>}

// ─── SOCIAL ──────────────────────────────────────────────────────────
function Social({posts,setPosts,T,pid}){
  const pp=pid==='alsem'?['instagram','youtube','linkedin']:['instagram','tiktok','youtube','spotify'];
  const [plat,setPlat]=useState(pp[0]);
  const [showAdd,setShowAdd]=useState(false);
  const [np,setNp]=useState({body:'',hashtags:'',date:'',time:'',status:'draft',type:'image',recurrence:'none',recurrenceEnd:''});
  const is=IS(T);
  const pPosts=posts.filter(p=>p.platform===plat).sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  const pl=PL[plat]||PL.instagram;
  const add=()=>{
    if(!np.body.trim())return;
    const full=np.hashtags?np.body+'\n\n'+np.hashtags:np.body;
    const newPosts=[];
    const addDays=(d,n)=>{const dt=new Date(d+'T00:00:00');dt.setDate(dt.getDate()+n);return dt.toISOString().split('T')[0];};
    const intervals={none:0,daily:1,weekly:7,biweekly:14,monthly:30};
    const step=intervals[np.recurrence]||0;
    const endDate=np.recurrenceEnd||np.date;
    let cur=np.date;
    let idx=0;
    do{
      newPosts.push({content:full,date:cur,time:np.time,status:np.status,type:np.type,id:Date.now()+idx,platform:plat,recurrence:np.recurrence!=='none'?np.recurrence:null});
      if(step===0)break;
      cur=addDays(cur,step);
      idx++;
    }while(cur<=endDate&&idx<52);
    setPosts(p=>[...p,...newPosts]);
    setNp({body:'',hashtags:'',date:'',time:'',status:'draft',type:'image',recurrence:'none',recurrenceEnd:''});
    setShowAdd(false);
  };

  return <div style={{animation:'fadeIn .3s ease'}}>
    <div style={{padding:'64px 24px 22px',background:T.heroBg}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:20}}>
        <div>
          <h2 style={{fontSize:52,fontFamily:T.fD,color:T.tx,lineHeight:.88,letterSpacing:'.04em'}}>RESEAUX</h2>
          <p style={{fontSize:10,color:T.txs,marginTop:6,fontFamily:T.fB}}>{posts.filter(p=>p.status==='scheduled').length} programmes</p>
        </div>
        <div style={{display:'flex',gap:8}}>

          <button onClick={()=>setShowAdd(true)} style={{width:44,height:44,borderRadius:'50%',background:'linear-gradient(135deg,'+T.c1+','+T.c2+')',display:'flex',alignItems:'center',justifyContent:'center',border:'none',cursor:'pointer',flexShrink:0}}>
            <span style={{fontSize:26,color:'#fff',fontWeight:300,lineHeight:1,marginTop:-2}}>+</span>
          </button>
        </div>
      </div>
      <div style={{display:'flex',gap:8,overflowX:'auto',paddingBottom:4}}>
        {pp.map(id=>{const p=PL[id];const n=posts.filter(x=>x.platform===id).length;return <button key={id} onClick={()=>setPlat(id)} style={{display:'flex',alignItems:'center',gap:6,padding:'8px 14px',borderRadius:22,whiteSpace:'nowrap',background:plat===id?p.g:'rgba(255,255,255,.06)',border:'1px solid '+(plat===id?'transparent':'rgba(255,255,255,.1)'),fontSize:10,fontWeight:700,color:'#fff',cursor:'pointer',fontFamily:T.fB}}><span>{p.e}</span><span>{p.n}</span><span style={{background:'rgba(255,255,255,.2)',borderRadius:10,padding:'1px 6px',fontSize:9}}>{n}</span></button>;})}
      </div>
    </div>

    <div style={{padding:'16px 20px 8px'}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:4}}>
        {[{l:'Total',v:pPosts.length,c:T.c1},{l:'Programmes',v:pPosts.filter(p=>p.status==='scheduled').length,c:T.c3},{l:'Publies',v:pPosts.filter(p=>p.status==='published').length,c:'#34d399'}].map((s,i)=>(
          <div key={i} style={{background:'rgba(255,255,255,.04)',borderRadius:14,padding:'12px 8px',border:'1px solid rgba(255,255,255,.07)',textAlign:'center'}}>
            <div style={{fontSize:30,color:s.c,lineHeight:1,fontFamily:T.fD}}>{s.v}</div>
            <div style={{fontSize:8,color:T.txs,textTransform:'uppercase',letterSpacing:'.1em',marginTop:2,fontFamily:T.fB}}>{s.l}</div>
          </div>
        ))}
      </div>
    </div>

    <div style={{padding:'0 20px 20px'}}>
      {pPosts.length===0?<Empty text={'Aucun contenu '+pl.n+' — utilise les templates'} T={T}/>:pPosts.map(post=>{
        const s=RST[post.status];
        const sc=post.status==='published'?'#34d399':post.status==='scheduled'?T.c2:'rgba(255,255,255,.3)';
        return <div key={post.id} style={{background:'rgba(255,255,255,.04)',border:'1px solid rgba(255,255,255,.07)',borderRadius:18,padding:'14px 16px',marginBottom:10,marginTop:4}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
            <span style={{fontSize:9,fontWeight:700,background:sc+'22',color:sc,border:'1px solid '+sc+'44',padding:'3px 10px',borderRadius:20,textTransform:'uppercase',letterSpacing:'.08em',fontFamily:T.fM}}>{s.l}</span>
            <button onClick={()=>setPosts(p=>p.filter(x=>x.id!==post.id))} style={{color:'rgba(255,255,255,.25)',fontSize:20,cursor:'pointer',lineHeight:1,background:'none',border:'none'}}>×</button>
          </div>
          <p style={{fontSize:13,color:T.tx,lineHeight:1.6,marginBottom:10,fontFamily:T.fB,whiteSpace:'pre-line'}}>{post.content}</p>
          <div style={{display:'flex',gap:12,flexWrap:'wrap'}}>
            {post.date&&<span style={{fontSize:9,color:T.txs,fontFamily:T.fM}}>📅 {post.date}{post.time&&' · '+post.time}</span>}
            <span style={{fontSize:9,color:T.txd,fontFamily:T.fM}}>📎 {post.type}</span>
            {post.recurrence&&<span style={{fontSize:9,color:T.c3,fontFamily:T.fM,display:'inline-flex',alignItems:'center',gap:3}}><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>{{daily:'Quotidien',weekly:'Hebdo',biweekly:'2 sem.',monthly:'Mensuel'}[post.recurrence]}</span>}
          </div>
        </div>;
      })}
    </div>

    {showAdd&&<Modal title={'Nouveau · '+pl.n} onClose={()=>setShowAdd(false)} onConfirm={add} cLabel="PUBLIER" T={T}>

      <FF label="Caption / Texte" T={T}><textarea value={np.body} onChange={e=>setNp(p=>({...p,body:e.target.value}))} placeholder={'Contenu '+pl.n+'...'} style={{...is,height:110,resize:'none',lineHeight:1.6}}/></FF>
      <FF label="Hashtags" T={T}><input value={np.hashtags} onChange={e=>setNp(p=>({...p,hashtags:e.target.value}))} placeholder="#rap #newmusic #fyp ..." style={is}/></FF>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        <FF label="Date" T={T}><input type="date" value={np.date} onChange={e=>setNp(p=>({...p,date:e.target.value}))} style={is}/></FF>
        <FF label="Heure" T={T}><input type="time" value={np.time} onChange={e=>setNp(p=>({...p,time:e.target.value}))} style={is}/></FF>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        <FF label="Statut" T={T}><select value={np.status} onChange={e=>setNp(p=>({...p,status:e.target.value}))} style={is}>{Object.entries(RST).map(([k,v])=><option key={k} value={k}>{v.l}</option>)}</select></FF>
        <FF label="Format" T={T}><select value={np.type} onChange={e=>setNp(p=>({...p,type:e.target.value}))} style={is}>{['image','video','reel','short','story','carrousel','playlist','single','podcast'].map(t=><option key={t} value={t}>{t}</option>)}</select></FF>
      </div>
      {/* RECURRENCE */}
      <div style={{background:'rgba(255,255,255,.04)',borderRadius:14,padding:'14px 16px',border:'1px solid '+T.border}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={T.c1} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
          <span style={{fontSize:10,fontWeight:700,color:T.txd,textTransform:'uppercase',letterSpacing:'.14em',fontFamily:T.fM}}>Recurrence automatique</span>
        </div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:np.recurrence!=='none'?12:0}}>
          {[{id:'none',l:'Aucune'},{id:'daily',l:'Quotidien'},{id:'weekly',l:'Hebdo'},{id:'biweekly',l:'2 semaines'},{id:'monthly',l:'Mensuel'}].map(r=>(
            <button key={r.id} onClick={()=>setNp(p=>({...p,recurrence:r.id}))} style={{padding:'6px 12px',borderRadius:20,fontSize:10,fontWeight:700,cursor:'pointer',background:np.recurrence===r.id?T.c1:'rgba(255,255,255,.06)',color:np.recurrence===r.id?'#fff':'rgba(255,255,255,.4)',border:'1px solid '+(np.recurrence===r.id?T.c1:'rgba(255,255,255,.1)'),fontFamily:T.fB,transition:'all .2s'}}>
              {r.l}
            </button>
          ))}
        </div>
        {np.recurrence!=='none'&&<FF label="Repeter jusqu au" T={T}>
          <input type="date" value={np.recurrenceEnd} onChange={e=>setNp(p=>({...p,recurrenceEnd:e.target.value}))} style={is}/>
          {np.recurrenceEnd&&np.date&&<p style={{fontSize:10,color:T.c1,marginTop:6,fontFamily:T.fM}}>
            {(()=>{const step={daily:1,weekly:7,biweekly:14,monthly:30}[np.recurrence]||7;const diff=Math.ceil((new Date(np.recurrenceEnd)-new Date(np.date))/(86400000*step));return diff>0?diff+' post'+(diff>1?'s':'')+' generes automatiquement':null;})()}
          </p>}
        </FF>}
      </div>
    </Modal>}
  </div>;
}


// ─── FINANCE (Alsem only) ────────────────────────────────────────────
function Finance({finance,setFinance,events,T}){
  const [showAdd,setShowAdd]=useState(false);
  const [sel,setSel]=useState(null);
  const [nf,setNf]=useState({evtId:'',type:'client',title:'',date:'',hours:'',price:'',paid:false});
  const is=IS(T);

  // Auto-compute price for client (hours * 25) and commission (12.5%)
  const clientPrice=nf.type==='client'?((parseFloat(nf.hours)||0)*25):parseFloat(nf.price)||0;
  const hilaire=Math.round(clientPrice*0.125*100)/100;

  const add=()=>{
    if(!nf.title)return;
    const price=nf.type==='client'?(parseFloat(nf.hours)||0)*25:parseFloat(nf.price)||0;
    const entry={id:Date.now(),evtId:nf.evtId||null,type:nf.type,title:nf.title,date:nf.date,
      hours:nf.type==='client'?parseFloat(nf.hours)||0:null,
      price:price,hilaire:Math.round(price*0.125*100)/100,paid:nf.paid};
    setFinance(p=>[...p,entry]);
    setNf({evtId:'',type:'client',title:'',date:'',hours:'',price:'',paid:false});
    setShowAdd(false);
  };

  const togglePaid=id=>{setFinance(p=>p.map(x=>x.id===id?{...x,paid:!x.paid}:x));};

  // Stats
  const fin=finance||[];
  const totalGross=fin.reduce((s,f)=>s+(f.price||0),0);
  const totalHilaire=fin.reduce((s,f)=>s+(f.hilaire||0),0);
  const totalNet=totalGross-totalHilaire;
  const paid=fin.filter(f=>f.paid).reduce((s,f)=>s+(f.price||0),0);
  const pending=fin.filter(f=>!f.paid).reduce((s,f)=>s+(f.price||0),0);

  // Client events from planning for quick link
  const clientEvts=(events||[]).filter(e=>e.cat==='client'||e.cat==='mix');

  return <div style={{animation:"fadeIn .3s ease"}}>
    <div style={{padding:"64px 24px 22px",background:T.heroBg}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}}>
        <div>
          <h2 style={{fontSize:52,fontFamily:T.fD,color:T.tx,lineHeight:.88,letterSpacing:".04em"}}>FINANCE</h2>
          <p style={{fontSize:10,color:T.txs,marginTop:6,fontFamily:T.fB}}>{fin.length} entrees · {fin.filter(f=>!f.paid).length} en attente</p>
        </div>
        <button onClick={()=>setShowAdd(true)} style={{width:44,height:44,borderRadius:"50%",background:"linear-gradient(135deg,"+T.c1+","+T.c2+")",display:"flex",alignItems:"center",justifyContent:"center",border:"none",cursor:"pointer",flexShrink:0}}>
          <span style={{fontSize:26,color:"#fff",fontWeight:300,lineHeight:1,marginTop:-2}}>+</span>
        </button>
      </div>

      {/* Stats */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10,marginBottom:10}}>
        <div style={{background:"rgba(255,255,255,.06)",borderRadius:16,padding:"14px",border:"1px solid rgba(255,255,255,.08)",gridColumn:"1/-1"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
            <div>
              <div style={{fontSize:9,color:T.txs,textTransform:"uppercase",letterSpacing:".12em",fontFamily:T.fM,marginBottom:4}}>Total brut</div>
              <div style={{fontSize:42,color:T.c1,lineHeight:1,fontFamily:T.fD}}>{totalGross.toFixed(0)} €</div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:9,color:T.txs,textTransform:"uppercase",letterSpacing:".1em",fontFamily:T.fM,marginBottom:2}}>Hilaire (12.5%)</div>
              <div style={{fontSize:22,color:"#f59e0b",fontFamily:T.fD}}>- {totalHilaire.toFixed(2)} €</div>
              <div style={{fontSize:9,color:T.txd,fontFamily:T.fM,marginTop:2}}>Net Alsem : {totalNet.toFixed(2)} €</div>
            </div>
          </div>
        </div>
        {[{l:"Recu",v:paid,c:"#34d399"},{l:"En attente",v:pending,c:"#f59e0b"}].map((s,i)=>(
          <div key={i} style={{background:"rgba(255,255,255,.04)",borderRadius:14,padding:"12px 14px",border:"1px solid rgba(255,255,255,.07)"}}>
            <div style={{fontSize:8,color:T.txs,textTransform:"uppercase",letterSpacing:".1em",fontFamily:T.fM,marginBottom:4}}>{s.l}</div>
            <div style={{fontSize:26,color:s.c,fontFamily:T.fD}}>{s.v.toFixed(0)} €</div>
          </div>
        ))}
      </div>
    </div>

    {/* Entries list */}
    <div style={{padding:"12px 20px 20px"}}>
      {fin.length===0?<Empty text="Aucune entree — ajoute via Planning ou manuellement" T={T}/>:
        [...fin].sort((a,b)=>(b.date||"").localeCompare(a.date||"")).map(f=>{
          const cc=f.type==="client"?T.c1:T.c2;
          return <div key={f.id} style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.07)",borderLeft:"3px solid "+cc,borderRadius:"0 16px 16px 0",padding:"14px 16px",marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
              <div style={{flex:1,minWidth:0,marginRight:10}}>
                <div style={{fontSize:13,fontWeight:700,color:T.tx,fontFamily:T.fB,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.title}</div>
                <div style={{fontSize:10,color:T.txs,marginTop:2,fontFamily:T.fM}}>{f.date||"—"} · <span style={{color:cc}}>{f.type==="client"?"Client":"Mixage"}</span></div>
              </div>
              <button onClick={()=>setFinance(p=>p.filter(x=>x.id!==f.id))} style={{color:"rgba(255,255,255,.2)",fontSize:18,cursor:"pointer",lineHeight:1,background:"none",border:"none",flexShrink:0}}>×</button>
            </div>

            {/* Prix row */}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <div>
                {f.type==="client"&&<span style={{fontSize:10,color:T.txs,fontFamily:T.fM}}>{f.hours}h × 25€ = </span>}
                <span style={{fontSize:22,color:T.tx,fontFamily:T.fD}}>{(f.price||0).toFixed(0)} €</span>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:9,color:"#f59e0b",fontFamily:T.fM}}>Hilaire : {(f.hilaire||0).toFixed(2)} €</div>
                <div style={{fontSize:11,color:T.c1,fontFamily:T.fD,marginTop:1}}>Net : {((f.price||0)-(f.hilaire||0)).toFixed(2)} €</div>
              </div>
            </div>

            {/* Paid toggle */}
            <button onClick={()=>togglePaid(f.id)} style={{display:"flex",alignItems:"center",gap:7,padding:"6px 12px",borderRadius:20,fontSize:10,fontWeight:700,cursor:"pointer",background:f.paid?"rgba(52,211,153,.15)":"rgba(255,255,255,.06)",color:f.paid?"#34d399":"rgba(255,255,255,.4)",border:"1px solid "+(f.paid?"rgba(52,211,153,.3)":"rgba(255,255,255,.12)"),fontFamily:T.fM,transition:"all .2s"}}>
              <div style={{width:12,height:12,borderRadius:"50%",background:f.paid?"#34d399":"transparent",border:"1.5px solid "+(f.paid?"#34d399":"rgba(255,255,255,.3)"),display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,color:"#000"}}>{f.paid&&"✓"}</div>
              {f.paid?"Paye":"Marquer paye"}
            </button>
          </div>;
        })
      }
    </div>

    {/* Add modal */}
    {showAdd&&<Modal title="Nouvelle entree" onClose={()=>setShowAdd(false)} onConfirm={add} cLabel="ENREGISTRER" T={T}>
      {/* Quick link to planning events */}
      {clientEvts.length>0&&<FF label="Lier a un evenement planning" T={T}>
        <select value={nf.evtId} onChange={e=>{
          const ev=clientEvts.find(x=>String(x.id)===e.target.value);
          if(ev)setNf(p=>({...p,evtId:ev.id,title:ev.title,date:ev.date,type:ev.cat==="mix"?"mix":"client"}));
          else setNf(p=>({...p,evtId:''}));
        }} style={is}>
          <option value="">-- Selectionner --</option>
          {clientEvts.map(ev=><option key={ev.id} value={ev.id}>{ev.title} ({ev.date})</option>)}
        </select>
      </FF>}

      {/* Type */}
      <FF label="Type de prestation" T={T}><div style={{display:"flex",gap:8}}>
        {[{id:"client",l:"Client (heures)🎚️"},{id:"mix",l:"Mixage (forfait)🎛️"}].map(tp=>(
          <button key={tp.id} onClick={()=>setNf(p=>({...p,type:tp.id}))} style={{flex:1,padding:"10px 8px",borderRadius:12,fontSize:11,fontWeight:600,cursor:"pointer",background:nf.type===tp.id?T.cDim:"transparent",color:nf.type===tp.id?T.c1:T.txs,border:"1px solid "+(nf.type===tp.id?T.c1:T.border),fontFamily:T.fB}}>{tp.l}</button>
        ))}
      </div></FF>

      <FF label="Titre / Client" T={T}><input value={nf.title} onChange={e=>setNf(p=>({...p,title:e.target.value}))} placeholder="Ex : Mix album Kira" style={is}/></FF>
      <FF label="Date" T={T}><input type="date" value={nf.date} onChange={e=>setNf(p=>({...p,date:e.target.value}))} style={is}/></FF>

      {nf.type==="client"?<>
        <FF label="Nombre d heures" T={T}><input type="number" min="0.5" step="0.5" value={nf.hours} onChange={e=>setNf(p=>({...p,hours:e.target.value}))} placeholder="Ex : 4" style={is}/></FF>
        <div style={{background:"rgba(255,255,255,.04)",borderRadius:12,padding:"12px 14px",border:"1px solid "+T.border}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:11,color:T.txs,fontFamily:T.fM}}>{nf.hours||0}h × 25€ / h</span>
            <span style={{fontSize:26,color:T.c1,fontFamily:T.fD}}>{clientPrice.toFixed(0)} €</span>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:6}}>
            <span style={{fontSize:10,color:"#f59e0b",fontFamily:T.fM}}>Commission Hilaire (12.5%)</span>
            <span style={{fontSize:14,color:"#f59e0b",fontFamily:T.fD}}>- {hilaire.toFixed(2)} €</span>
          </div>
          <div style={{borderTop:"1px solid "+T.border,marginTop:8,paddingTop:8,display:"flex",justifyContent:"space-between"}}>
            <span style={{fontSize:10,color:T.txs,fontFamily:T.fM,fontWeight:700}}>NET Alsem</span>
            <span style={{fontSize:18,color:"#34d399",fontFamily:T.fD}}>{(clientPrice-hilaire).toFixed(2)} €</span>
          </div>
        </div>
      </>:<>
        <FF label="Prix de la prestation (€)" T={T}><input type="number" min="0" step="10" value={nf.price} onChange={e=>setNf(p=>({...p,price:e.target.value}))} placeholder="Ex : 800" style={is}/></FF>
        <div style={{background:"rgba(255,255,255,.04)",borderRadius:12,padding:"12px 14px",border:"1px solid "+T.border}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:11,color:T.txs,fontFamily:T.fM}}>Prix forfait</span>
            <span style={{fontSize:26,color:T.c1,fontFamily:T.fD}}>{(parseFloat(nf.price)||0).toFixed(0)} €</span>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:6}}>
            <span style={{fontSize:10,color:"#f59e0b",fontFamily:T.fM}}>Commission Hilaire (12.5%)</span>
            <span style={{fontSize:14,color:"#f59e0b",fontFamily:T.fD}}>- {hilaire.toFixed(2)} €</span>
          </div>
          <div style={{borderTop:"1px solid "+T.border,marginTop:8,paddingTop:8,display:"flex",justifyContent:"space-between"}}>
            <span style={{fontSize:10,color:T.txs,fontFamily:T.fM,fontWeight:700}}>NET Alsem</span>
            <span style={{fontSize:18,color:"#34d399",fontFamily:T.fD}}>{((parseFloat(nf.price)||0)-hilaire).toFixed(2)} €</span>
          </div>
        </div>
      </>}

      <FF label="Statut paiement" T={T}><div style={{display:"flex",gap:8}}>
        {[{v:false,l:"En attente"},{v:true,l:"Paye ✓"}].map(s=>(
          <button key={String(s.v)} onClick={()=>setNf(p=>({...p,paid:s.v}))} style={{flex:1,padding:"10px",borderRadius:12,fontSize:11,fontWeight:600,cursor:"pointer",background:nf.paid===s.v?T.cDim:"transparent",color:nf.paid===s.v?T.c1:T.txs,border:"1px solid "+(nf.paid===s.v?T.c1:T.border),fontFamily:T.fB}}>{s.l}</button>
        ))}
      </div></FF>
    </Modal>}
  </div>;
}

// ─── APP ROOT ────────────────────────────────────────────────────────
function App(){
  const [pid,setPid]=useState('salem');
  const [sw,setSw]=useState(false);
  const [tab,setTab]=useState('home');
  const [data,setData]=useState({salem:{...INIT.salem},alsem:{...INIT.alsem}});
  const T=TH[pid];
  const sEv=useCallback(fn=>setData(d=>({...d,[pid]:{...d[pid],events:typeof fn==='function'?fn(d[pid].events):fn}})),[pid]);
  const sPr=useCallback(fn=>setData(d=>({...d,[pid]:{...d[pid],projects:typeof fn==='function'?fn(d[pid].projects):fn}})),[pid]);
  const sPo=useCallback(fn=>setData(d=>({...d,[pid]:{...d[pid],posts:typeof fn==='function'?fn(d[pid].posts):fn}})),[pid]);
  const sFin=useCallback(fn=>setData(d=>({...d,[pid]:{...d[pid],finance:typeof fn==='function'?fn(d[pid].finance||[]):fn}})),[pid]);
  const sw2=id=>{setPid(id);setTab('home');};
  const [quickFin,setQuickFin]=useState(null);
  const [showFinModal,setShowFinModal]=useState(false);
  const [qfHours,setQfHours]=useState('');
  const [qfPrice,setQfPrice]=useState('');
  const saveQuickFin=()=>{
    if(!quickFin)return;
    const isMix=quickFin.cat==='mix';
    const price=isMix?(parseFloat(qfPrice)||0):(parseFloat(qfHours)||0)*25;
    const hilaire=Math.round(price*0.125*100)/100;
    setData(d=>({...d,alsem:{...d.alsem,finance:[...(d.alsem.finance||[]),{id:Date.now(),evtId:quickFin.id,type:isMix?'mix':'client',title:quickFin.title,date:quickFin.date,hours:isMix?null:(parseFloat(qfHours)||0),price,hilaire,paid:false}]}}));
    setQuickFin(null);setQfHours('');setQfPrice('');setShowFinModal(false);
  };
  // ── Google Calendar state
  const [gcalOk, setGcalOk] = useState(false);
  const [gcalBusy, setGcalBusy] = useState(false);
  const prevSalemEv = useRef(null);

  const _doSync = useCallback(async () => {
    setGcalBusy(true);
    const gEvts = await _fetchGCalEvents();
    setData(d => {
      const ex = d.salem.events;
      const ids = new Set(ex.map(e=>e.gcalId).filter(Boolean));
      const add = gEvts.filter(g=>!ids.has(g.id)).map(_gToLocal);
      return add.length ? {...d,salem:{...d.salem,events:[...ex,...add]}} : d;
    });
    setGcalBusy(false);
  }, []);

  const connectGCal = useCallback(() => {
    if (GCAL_CLIENT_ID === 'VOTRE_CLIENT_ID.apps.googleusercontent.com') {
      alert('⚠️ Configurez votre Client ID Google dans le code (constante GCAL_CLIENT_ID).');
      return;
    }
    const start = async () => { setGcalOk(true); prevSalemEv.current = null; await _doSync(); };
    if (!_gcalClient) { if (!_initGCal(start)) { alert('Google Identity Services non chargé.'); return; } }
    _gcalClient.requestAccessToken();
  }, [_doSync]);

  // App → GCal : détecte ajouts / suppressions dans les events Salem
  useEffect(() => {
    if (!gcalOk) return;
    const cur = data.salem.events;
    const prev = prevSalemEv.current;
    if (prev === null) { prevSalemEv.current = cur; return; }
    if (prev === cur) return;
    // Ajouts : events présents dans cur mais pas dans prev, sans gcalId
    cur.filter(ne => !ne.gcalId && !ne.fromGCal && !prev.find(pe=>pe.id===ne.id))
       .forEach(async ev => {
         const gcalId = await _pushGCal(ev);
         if (gcalId) setData(d=>({...d,salem:{...d.salem,events:d.salem.events.map(e=>e.id===ev.id?{...e,gcalId}:e)}}));
       });
    // Suppressions : events dans prev avec gcalId absents de cur
    prev.filter(pe=>pe.gcalId && !cur.find(ce=>ce.id===pe.id))
        .forEach(ev=>_deleteGCal(ev.gcalId));
    prevSalemEv.current = cur;
  }, [data.salem.events, gcalOk]);

  // GCal → App : polling toutes les 60 s
  useEffect(() => {
    if (!gcalOk) return;
    const t = setInterval(_doSync, 60000);
    return () => clearInterval(t);
  }, [gcalOk, _doSync]);


  const pd=data[pid];

  const nav=[
    {id:'home',    l:'HOME',     I:NI.home},
    {id:'planning',l:'AGENDA',   I:NI.cal},
    {id:'projects',l:'PROJETS',  I:NI.fold},
    {id:'social',  l:'RESEAUX',  I:NI.shr},
    ...(pid==='alsem'?[{id:'finance',l:'FINANCE',I:NI.fin}]:[])
  ];

  const screens={
    home:    <Home events={pd.events} projects={pd.projects} posts={pd.posts} goTo={setTab} T={T} pid={pid}/>,
    planning:<Planning events={pd.events} setEvents={sEv} T={T} pid={pid} onAddFinance={pid==='alsem'?ev=>{setQuickFin(ev);setShowFinModal(true);}:null}/>,
    projects:<Projects projects={pd.projects} setProjects={sPr} T={T}/>,
    social:  <Social posts={pd.posts} setPosts={sPo} T={T} pid={pid}/>,
    finance: <Finance finance={pd.finance||[]} setFinance={sFin} events={pd.events} T={T}/>
  };

  return <div style={{width:'100%',maxWidth:430,margin:'0 auto',height:'100vh',background:T.bg,color:T.tx,position:'relative',display:'flex',flexDirection:'column',fontFamily:T.fB,transition:'background .5s'}}>
    {sw&&<Switcher cur={pid} onSwitch={sw2} onClose={()=>setSw(false)}/>}

    {/* Profile pill */}
    <button onClick={()=>setSw(true)} style={{position:'fixed',top:16,right:16,zIndex:200,display:'flex',alignItems:'center',gap:8,padding:'6px 12px 6px 7px',background:T.bg,backdropFilter:'blur(16px)',borderRadius:30,border:'1px solid '+T.border,cursor:'pointer',boxShadow:'0 2px 20px rgba(0,0,0,.5)'}}>
      <div style={{width:26,height:26,borderRadius:'50%',background:T.avatarGrad,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,color:'#fff',flexShrink:0,fontFamily:T.fM}}>{T.initial}</div>
      <div>
        <div style={{fontSize:10,fontWeight:700,color:T.tx,lineHeight:1,fontFamily:T.fM,letterSpacing:'.04em'}}>{T.name.toUpperCase()}</div>
        <div style={{fontSize:7,color:T.txd,marginTop:1,fontFamily:T.fM,letterSpacing:'.06em'}}>HILAIRE</div>
      </div>
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke={T.txd} strokeWidth="2" strokeLinecap="round"><polyline points="6 9 12 15 18 9"/></svg>
    </button>

    <div key={pid} style={{flex:1,overflowY:'auto',paddingBottom:88}}>{screens[tab]}</div>
    {/* Google Calendar sync — Salem only */}
    {pid==='salem'&&tab==='planning'&&<div style={{position:'fixed',bottom:96,right:14,zIndex:150,display:'flex',flexDirection:'column',alignItems:'flex-end',gap:6}}>
      <button onClick={connectGCal} style={{display:'flex',alignItems:'center',gap:7,padding:'8px 14px',background:gcalOk?'rgba(52,211,153,.18)':'rgba(255,107,53,.18)',border:'1px solid '+(gcalOk?'rgba(52,211,153,.5)':'rgba(255,107,53,.5)'),borderRadius:20,cursor:'pointer',fontSize:10,fontWeight:700,color:gcalOk?'#34d399':TH.salem.c1,fontFamily:TH.salem.fM,letterSpacing:'.05em',backdropFilter:'blur(12px)',boxShadow:'0 2px 16px rgba(0,0,0,.4)'}}>
        <span style={{fontSize:13}}>{gcalOk?'📅':'📅'}</span>
        {gcalBusy?'Synchro…':gcalOk?'Google Agenda ✓':'Connecter Agenda'}
      </button>
    </div>}



    {/* Quick Finance Modal — auto-triggered from Planning */}
    {showFinModal&&quickFin&&<div style={{position:'fixed',inset:0,zIndex:500,background:'rgba(0,0,0,.92)',backdropFilter:'blur(16px)',display:'flex',alignItems:'flex-end'}} onClick={e=>e.target===e.currentTarget&&setShowFinModal(false)}>
      <div style={{width:'100%',maxWidth:430,margin:'0 auto',background:TH.alsem.cardAlt,borderRadius:'28px 28px 0 0',border:'1px solid '+TH.alsem.border,borderBottom:'none',padding:'24px 20px 48px',animation:'slideUp .28s ease'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
          <div>
            <h3 style={{fontSize:20,fontWeight:700,fontFamily:TH.alsem.fD,color:TH.alsem.tx,letterSpacing:'.02em'}}>💰 Facturation</h3>
            <p style={{fontSize:11,color:TH.alsem.txs,fontFamily:TH.alsem.fB,marginTop:3}}>{quickFin.title} · {quickFin.date}</p>
          </div>
          <button onClick={()=>setShowFinModal(false)} style={{width:34,height:34,borderRadius:'50%',background:'rgba(255,255,255,.08)',color:TH.alsem.txs,border:'1px solid '+TH.alsem.border,fontSize:22,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',lineHeight:1}}>×</button>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          {quickFin.cat==='client'?<>
            <div style={{display:'flex',flexDirection:'column',gap:6}}>
              <span style={{fontSize:9,fontWeight:700,color:TH.alsem.txd,textTransform:'uppercase',letterSpacing:'.14em',fontFamily:TH.alsem.fM}}>Nombre d heures (tarif 25€/h)</span>
              <input type="number" min="0.5" step="0.5" value={qfHours} onChange={e=>setQfHours(e.target.value)} placeholder="Ex : 4" style={{width:'100%',padding:'11px 13px',background:'#1a1a2e',border:'1px solid '+TH.alsem.border,borderRadius:14,fontSize:13,color:'#fff',outline:'none',fontFamily:TH.alsem.fB,colorScheme:'dark'}}/>
            </div>
            {qfHours&&<div style={{background:'rgba(255,255,255,.04)',borderRadius:12,padding:'12px 14px',border:'1px solid '+TH.alsem.border}}>
              <div style={{display:'flex',justifyContent:'space-between'}}><span style={{fontSize:11,color:TH.alsem.txs,fontFamily:TH.alsem.fM}}>{qfHours}h × 25€</span><span style={{fontSize:26,color:TH.alsem.c1,fontFamily:TH.alsem.fD}}>{((parseFloat(qfHours)||0)*25).toFixed(0)} €</span></div>
              <div style={{display:'flex',justifyContent:'space-between',marginTop:6}}><span style={{fontSize:10,color:'#f59e0b',fontFamily:TH.alsem.fM}}>Hilaire (12.5%)</span><span style={{fontSize:14,color:'#f59e0b',fontFamily:TH.alsem.fD}}>- {((parseFloat(qfHours)||0)*25*0.125).toFixed(2)} €</span></div>
              <div style={{borderTop:'1px solid '+TH.alsem.border,marginTop:8,paddingTop:8,display:'flex',justifyContent:'space-between'}}><span style={{fontSize:10,fontWeight:700,color:TH.alsem.txs,fontFamily:TH.alsem.fM}}>NET Alsem</span><span style={{fontSize:18,color:'#34d399',fontFamily:TH.alsem.fD}}>{((parseFloat(qfHours)||0)*25*0.875).toFixed(2)} €</span></div>
            </div>}
          </>:<>
            <div style={{display:'flex',flexDirection:'column',gap:6}}>
              <span style={{fontSize:9,fontWeight:700,color:TH.alsem.txd,textTransform:'uppercase',letterSpacing:'.14em',fontFamily:TH.alsem.fM}}>Prix du mixage (€)</span>
              <input type="number" min="0" step="10" value={qfPrice} onChange={e=>setQfPrice(e.target.value)} placeholder="Ex : 800" style={{width:'100%',padding:'11px 13px',background:'#1a1a2e',border:'1px solid '+TH.alsem.border,borderRadius:14,fontSize:13,color:'#fff',outline:'none',fontFamily:TH.alsem.fB,colorScheme:'dark'}}/>
            </div>
            {qfPrice&&<div style={{background:'rgba(255,255,255,.04)',borderRadius:12,padding:'12px 14px',border:'1px solid '+TH.alsem.border}}>
              <div style={{display:'flex',justifyContent:'space-between'}}><span style={{fontSize:11,color:TH.alsem.txs,fontFamily:TH.alsem.fM}}>Forfait mixage</span><span style={{fontSize:26,color:TH.alsem.c1,fontFamily:TH.alsem.fD}}>{(parseFloat(qfPrice)||0).toFixed(0)} €</span></div>
              <div style={{display:'flex',justifyContent:'space-between',marginTop:6}}><span style={{fontSize:10,color:'#f59e0b',fontFamily:TH.alsem.fM}}>Hilaire (12.5%)</span><span style={{fontSize:14,color:'#f59e0b',fontFamily:TH.alsem.fD}}>- {((parseFloat(qfPrice)||0)*0.125).toFixed(2)} €</span></div>
              <div style={{borderTop:'1px solid '+TH.alsem.border,marginTop:8,paddingTop:8,display:'flex',justifyContent:'space-between'}}><span style={{fontSize:10,fontWeight:700,color:TH.alsem.txs,fontFamily:TH.alsem.fM}}>NET Alsem</span><span style={{fontSize:18,color:'#34d399',fontFamily:TH.alsem.fD}}>{((parseFloat(qfPrice)||0)*0.875).toFixed(2)} €</span></div>
            </div>}
          </>}
        </div>
        <div style={{display:'flex',gap:8,marginTop:22}}>
          <button onClick={()=>{setShowFinModal(false);setQfHours('');setQfPrice('');}} style={{flex:1,padding:'13px',background:'rgba(255,255,255,.06)',borderRadius:14,fontSize:12,fontWeight:600,color:TH.alsem.txs,border:'1px solid '+TH.alsem.border,cursor:'pointer',fontFamily:TH.alsem.fB}}>Ignorer</button>
          <button onClick={saveQuickFin} style={{flex:2,padding:'13px',background:'linear-gradient(135deg,'+TH.alsem.c1+','+TH.alsem.c2+')',borderRadius:14,fontSize:12,fontWeight:700,color:'#fff',border:'none',cursor:'pointer',fontFamily:TH.alsem.fB,textTransform:'uppercase',letterSpacing:'.06em'}}>Enregistrer</button>
        </div>
      </div>
    </div>}

    {/* Bottom nav */}
    <div style={{position:'fixed',bottom:0,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:430,background:T.navBg,backdropFilter:'blur(20px)',borderTop:'1px solid '+T.border,display:'flex',padding:'10px 8px 28px',zIndex:100,gap:4}}>
      {nav.map(({id,l,I})=>{
        const a=tab===id;
        const c=T.navC[id];
        return <button key={id} onClick={()=>setTab(id)} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3,padding:'5px 0',background:'none',border:'none',cursor:'pointer'}}>
          <div style={{width:42,height:28,display:'flex',alignItems:'center',justifyContent:'center',borderRadius:12,background:a?c+'1a':'transparent',transition:'all .2s'}}>
            <I c={a?c:'rgba(255,255,255,.2)'} s={19}/>
          </div>
          <span style={{fontSize:7,fontWeight:a?700:400,color:a?c:'rgba(255,255,255,.2)',letterSpacing:'.06em',fontFamily:T.fB}}>{l}</span>
        </button>;
      })}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
